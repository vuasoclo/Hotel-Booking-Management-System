<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — HBMS Little Hotelier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="css/globals.css">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--color-primary-900) 0%, var(--color-primary-600) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .login-logo {
      width: 48px;
      height: 48px;
      background: var(--color-primary-600);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      margin: 0 auto 16px;
    }
    .role-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 6px;
    }
    .role-admin { background: #FEF3C7; color: #92400E; }
    .role-staff { background: #EFF8FB; color: #0A6B87; }
    .demo-accounts { background: var(--color-neutral-50); border-radius: 8px; padding: 12px; }
    .demo-account-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--color-neutral-200);
      cursor: pointer;
      transition: background 0.15s;
    }
    .demo-account-row:last-child { border-bottom: none; }
    .demo-account-row:hover { background: var(--color-primary-50); border-radius: 4px; padding: 6px 4px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <i data-feather="box" style="width:24px;height:24px"></i>
    </div>
    <h1 class="text-center text-heading mb-1" style="font-size:20px">Little Hotelier</h1>
    <p class="text-center text-muted text-small mb-4">Hotel Booking Management System</p>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="mb-3">
        <label class="text-small fw-semibold mb-1">Username</label>
        <input type="text" id="username" class="form-control form-control-custom"
               placeholder="admin / staff1 / staff2" autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="text-small fw-semibold mb-1">Password</label>
        <div class="input-group">
          <input type="password" id="password" class="form-control form-control-custom border-end-0"
                 placeholder="password" autocomplete="current-password">
          <button class="btn btn-outline-secondary border-start-0" type="button"
                  onclick="togglePassword()" style="height:36px;border-color:var(--color-neutral-200)">
            <i data-feather="eye" id="eye-icon" style="width:16px"></i>
          </button>
        </div>
      </div>

      <div id="login-error" class="alert alert-danger text-small py-2 d-none" role="alert">
        Sai tài khoản hoặc mật khẩu.
      </div>

      <button type="submit" class="btn-primary-custom w-100 d-flex align-items-center justify-content-center gap-2"
              style="height:40px">
        <i data-feather="log-in" style="width:16px"></i> Đăng nhập
      </button>
    </form>

    <div class="mt-4">
      <p class="text-small text-muted mb-2 fw-semibold">Tài khoản demo — click để điền:</p>
      <div class="demo-accounts">
        <div class="demo-account-row" onclick="fillCredentials('admin','admin123')">
          <span class="text-small fw-medium">admin — Nguyễn Admin</span>
          <span class="role-badge role-admin">Admin</span>
        </div>
        <div class="demo-account-row" onclick="fillCredentials('staff','staff123')">
          <span class="text-small fw-medium">staff — Trần Lễ Tân</span>
          <span class="role-badge role-staff">Staff</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    feather.replace();

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('login-error');

      try {
        const response = await fetch('http://localhost:8000/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        if (!response.ok) {
          const errorData = await response.json();
          errEl.innerText = errorData.detail || 'Sai tài khoản hoặc mật khẩu.';
          errEl.classList.remove('d-none');
          return;
        }

        const data = await response.json();
        errEl.classList.add('d-none');

        // Lưu session vào sessionStorage (backend sẽ dùng JWT/cookie thực)
        sessionStorage.setItem('hbms_user', JSON.stringify({
          username: username,
          name:    data.name,
          role:    data.role,
          staffId: data.staff_id,
        }));

        window.location.href = 'calendar.html';
      } catch (error) {
        console.error('Error during login:', error);
        errEl.innerText = 'Lỗi kết nối đến server.';
        errEl.classList.remove('d-none');
      }
    }

    function fillCredentials(user, pass) {
      document.getElementById('username').value = user;
      document.getElementById('password').value = pass;
      document.getElementById('login-error').classList.add('d-none');
    }

    function togglePassword() {
      const input   = document.getElementById('password');
      const icon    = document.getElementById('eye-icon');
      const isHide  = input.type === 'password';
      input.type    = isHide ? 'text' : 'password';
      icon.setAttribute('data-feather', isHide ? 'eye-off' : 'eye');
      feather.replace();
    }

    // Nếu đã đăng nhập rồi → redirect thẳng
    if (sessionStorage.getItem('hbms_user')) {
      window.location.href = 'calendar.html';
    }
  </script>
</body>
</html>
