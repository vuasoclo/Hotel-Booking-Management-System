services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hbms
    ports:
      - "6000:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/functions.sql:/docker-entrypoint-initdb.d/02_functions.sql
      - ./database/triggers.sql:/docker-entrypoint-initdb.d/03_triggers.sql
      - ./database/booking_procedures.sql:/docker-entrypoint-initdb.d/04_booking_procedures.sql
      - ./database/invoice_procedures.sql:/docker-entrypoint-initdb.d/05_invoice_procedures.sql
      - ./database/views.sql:/docker-entrypoint-initdb.d/06_views.sql
      - ./database/utilities.sql:/docker-entrypoint-initdb.d/07_utilities.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/08_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
    command: >
      sh -c "
      sleep 5 &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html

volumes:
  pgdata: