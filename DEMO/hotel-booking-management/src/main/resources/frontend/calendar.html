<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar - HBMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="css/globals.css">
  <style>
    .valid-drop   { background-color: rgba(16,185,129,0.1) !important; box-shadow: inset 0 0 0 2px #10B981; }
    .invalid-drop { background-color: rgba(239,68,68,0.1) !important;  box-shadow: inset 0 0 0 2px #EF4444; }
    body.dragging-invalid { cursor: not-allowed !important; }
    .dragging-original { opacity: 0.3; }
    .block-container { position: absolute; left: 140px; right: 0; top: 0; bottom: 0; }

    /* Hover highlight: booking cùng id sáng lên */
    .booking-block.booking-hover {
      filter: brightness(0.88);
      box-shadow: 0 0 0 2px currentColor;
      z-index: 10;
    }
  </style>
</head>
<body class="d-flex flex-column vh-100">

  <header class="topbar d-flex align-items-center justify-content-between px-4 w-100">
    <div class="d-flex align-items-center gap-3">
      <i data-feather="box" class="text-primary"></i>
      <span class="text-heading mb-0">Little Hotelier</span>
    </div>
    <div class="d-flex align-items-center gap-3">
      <div class="d-flex align-items-center gap-1">
        <span class="text-subheading" id="topbar-name">...</span>
        <span id="topbar-role" style="display:none"></span>
      </div>
      <i data-feather="bell" class="text-muted"></i>
      <button id="btn-logout" class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1" style="height:30px">
        <i data-feather="log-out" style="width:14px"></i> Logout
      </button>
    </div>
  </header>

  <div class="d-flex flex-grow-1 overflow-hidden">
    <aside class="sidebar py-3 d-flex flex-column">
      <nav class="flex-grow-1">
        <a href="calendar.html" class="sidebar-item active"><i data-feather="calendar" class="me-2"></i> Calendar</a>
        <a href="new-reservation.html" class="sidebar-item"><i data-feather="plus-square" class="me-2"></i> New Reservation</a>
        <a href="rooms.html" class="sidebar-item"><i data-feather="layout" class="me-2"></i> Rooms</a>
        <a href="statistics.html" class="sidebar-item"><i data-feather="bar-chart-2" class="me-2"></i> Statistics</a>
      </nav>
    </aside>

    <main class="main-content flex-grow-1 d-flex flex-column overflow-hidden">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-2">
          <div class="btn-group">
            <button class="btn btn-outline-secondary btn-sm"><i data-feather="chevron-left"></i></button>
            <button class="btn btn-outline-secondary btn-sm"><i data-feather="chevron-right"></i></button>
          </div>
          <span class="fw-bold px-2">25 Apr 2026 — 01 May 2026</span>
          <button class="btn btn-light btn-sm border">Today</button>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-primary btn-sm d-flex align-items-center gap-1">
            <i data-feather="zap" style="width:14px"></i> Defragment
          </button>
          <a href="new-reservation.html" class="btn btn-primary btn-sm d-flex align-items-center gap-1">
            <i data-feather="plus" style="width:14px"></i> New Reservation
          </a>
        </div>
      </div>

      <div class="calendar-container flex-grow-1 overflow-auto position-relative" id="calendar-wrapper">

        <div class="d-flex border-bottom sticky-top bg-white" style="z-index:20">
          <div class="room-label-col room-type-header d-flex align-items-center px-3" style="height:48px">Rooms</div>
          <div class="d-flex flex-grow-1">
            <div class="cal-header-cell flex-fill"><span class="text-small">Fri</span><strong>25</strong></div>
            <div class="cal-header-cell flex-fill"><span class="text-small">Sat</span><strong>26</strong></div>
            <div class="cal-header-cell flex-fill"><span class="text-small">Sun</span><strong>27</strong></div>
            <div class="cal-header-cell flex-fill"><span class="text-small">Mon</span><strong>28</strong></div>
            <div class="cal-header-cell flex-fill"><span class="text-small">Tue</span><strong>29</strong></div>
            <div class="cal-header-cell flex-fill"><span class="text-small">Wed</span><strong>30</strong></div>
            <div class="cal-header-cell flex-fill"><span class="text-small">Thu</span><strong>01</strong></div>
          </div>
        </div>

        <div id="calendar-grid"></div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    feather.replace();

    // ─── Auth Guard ────────────────────────────────────────────────────────────
    const session = JSON.parse(sessionStorage.getItem('hbms_user') || 'null');
    if (!session) { window.location.href = 'index.html'; }
    document.getElementById('topbar-name').textContent = session ? session.name : 'Guest';
    if (session && session.role === 'admin') {
      const badge = document.getElementById('topbar-role');
      badge.textContent = 'Admin';
      badge.className = 'badge bg-warning text-dark ms-1';
      badge.style.display = 'inline';
    }
    document.getElementById('btn-logout').addEventListener('click', () => {
      sessionStorage.removeItem('hbms_user');
      window.location.href = 'index.html';
    });

    // ─── Mock Data ─────────────────────────────────────────────────────────────
    const TOTAL_DAYS = 7;
    const roomTypes = [
      { id: 't1', name: 'Deluxe King' },
      { id: 't2', name: 'Suite' },
    ];
    const rooms = [
      { id: 'r101', typeId: 't1', name: 'Room 101', status: 'Available'   },
      { id: 'r102', typeId: 't1', name: 'Room 102', status: 'Available'   },
      { id: 'r103', typeId: 't1', name: 'Room 103', status: 'Dirty'       },
      { id: 'r201', typeId: 't2', name: 'Room 201', status: 'Available'   },
      { id: 'r202', typeId: 't2', name: 'Room 202', status: 'Maintenance' },
    ];
    // BK-00412: John Doe chiếm r101 + r102 cùng 1 booking_id (multi-room booking)
    let bookings = [
      { id: 'BK-00412', guest: 'John Doe',    inits: 'JD', roomId: 'r101', status: 'Checked-in', start: 0, length: 3 },
      { id: 'BK-00412', guest: 'John Doe',    inits: 'JD', roomId: 'r102', status: 'Checked-in', start: 0, length: 3 },
      { id: 'BK-00415', guest: 'Alice Smith', inits: 'AS', roomId: 'r103', status: 'Active',      start: 1, length: 4 },
      { id: 'BK-00418', guest: 'Bob Jones',   inits: 'BJ', roomId: 'r201', status: 'Active',      start: 3, length: 3 },
    ];

    // ─── Render ────────────────────────────────────────────────────────────────
    const gridEl = document.getElementById('calendar-grid');

    function renderCalendar() {
      gridEl.innerHTML = '';
      roomTypes.forEach(type => {
        gridEl.innerHTML += `<div class="room-row room-type-header align-items-center px-3">${type.name}</div>`;
        rooms.filter(r => r.typeId === type.id).forEach(room => {
          let rowHtml = `
            <div class="room-row position-relative" data-room-id="${room.id}" data-type-id="${type.id}">
              <div class="room-label-col d-flex align-items-center px-3 fw-medium">${room.name}</div>
              <div class="d-flex flex-grow-1 position-relative">`;
          for (let i = 0; i < TOTAL_DAYS; i++) {
            rowHtml += `<div class="border-end flex-fill" style="border-color:var(--color-neutral-200)"></div>`;
          }
          if (room.status === 'Dirty') {
            rowHtml += `<div class="position-absolute w-100 h-100 status-dirty pointer-events-none"></div>`;
          } else if (room.status === 'Maintenance') {
            rowHtml += `<div class="position-absolute w-100 h-100 status-maintenance d-flex align-items-center justify-content-center text-danger">
                          <i data-feather="lock" style="width:16px;margin-right:4px"></i> Maintenance
                        </div>`;
          }
          rowHtml += `<div class="block-container" id="container-${room.id}"></div></div></div>`;
          gridEl.innerHTML += rowHtml;
        });
      });

      bookings.forEach(booking => {
        const container = document.getElementById(`container-${booking.roomId}`);
        if (!container) return;
        const leftPct  = (booking.start / TOTAL_DAYS) * 100;
        const widthPct = (booking.length / TOTAL_DAYS) * 100;
        const cssClass = booking.status === 'Active' ? 'cal-active' : 'cal-checked-in';

        const block = document.createElement('div');
        block.className = `booking-block ${cssClass}`;
        block.style.left  = `${leftPct}%`;
        block.style.width = `calc(${widthPct}% - 4px)`;
        block.dataset.bookingId = booking.id;
        block.dataset.roomId    = booking.roomId;
        block.dataset.status    = booking.status;
        block.dataset.start     = booking.start;
        block.dataset.length    = booking.length;

        block.innerHTML = `
          <div class="block-avatar" style="${booking.status === 'Active' ? 'background:#3B82F6' : ''}">${booking.inits}</div>
          <strong>${booking.guest} — ${booking.id}</strong>`;

        // Click → booking detail (cùng booking_id dù ở phòng nào)
        block.addEventListener('click', () => {
          window.location.href = `booking-detail.html?id=${booking.id}`;
        });

        // Hover: sáng tất cả blocks có cùng booking_id
        block.addEventListener('mouseenter', () => {
          document.querySelectorAll(`.booking-block[data-booking-id="${booking.id}"]`)
            .forEach(b => b.classList.add('booking-hover'));
        });
        block.addEventListener('mouseleave', () => {
          document.querySelectorAll(`.booking-block[data-booking-id="${booking.id}"]`)
            .forEach(b => b.classList.remove('booking-hover'));
        });

        container.appendChild(block);
      });

      feather.replace();
      initDragAndDrop();
    }

    // ─── Drag & Drop ───────────────────────────────────────────────────────────
    function initDragAndDrop() {
      const blocks = document.querySelectorAll('.booking-block');
      let draggedBlock = null, ghost = null, offsetY = 0, originalRow = null;

      blocks.forEach(block => {
        if (block.dataset.status !== 'Active') return;
        block.addEventListener('mousedown', (e) => {
          e.preventDefault();
          draggedBlock = block;
          originalRow  = block.closest('.room-row');
          const rect   = block.getBoundingClientRect();
          offsetY      = e.clientY - rect.top;
          ghost = block.cloneNode(true);
          ghost.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;opacity:0.6;pointer-events:none;z-index:9999`;
          document.body.appendChild(ghost);
          block.classList.add('dragging-original');
        });
      });

      document.addEventListener('mousemove', (e) => {
        if (!draggedBlock || !ghost) return;
        ghost.style.top = (e.clientY - offsetY) + 'px';
        const targetEl   = document.elementFromPoint(e.clientX, e.clientY);
        const hoveredRow = targetEl ? targetEl.closest('.room-row[data-room-id]') : null;
        document.querySelectorAll('.room-row').forEach(r => r.classList.remove('valid-drop', 'invalid-drop'));
        document.body.classList.remove('dragging-invalid');
        if (hoveredRow) {
          let valid = hoveredRow.dataset.typeId === originalRow.dataset.typeId;
          if (valid) {
            const bS = parseInt(draggedBlock.dataset.start), bE = bS + parseInt(draggedBlock.dataset.length);
            hoveredRow.querySelectorAll('.booking-block:not(.dragging-original)').forEach(eb => {
              const eS = parseInt(eb.dataset.start), eE = eS + parseInt(eb.dataset.length);
              if (bS < eE && bE > eS) valid = false;
            });
          }
          hoveredRow.classList.add(valid ? 'valid-drop' : 'invalid-drop');
          if (!valid) document.body.classList.add('dragging-invalid');
        }
      });

      document.addEventListener('mouseup', (e) => {
        if (!draggedBlock || !ghost) return;
        const targetEl   = document.elementFromPoint(e.clientX, e.clientY);
        const hoveredRow = targetEl ? targetEl.closest('.room-row[data-room-id]') : null;
        if (hoveredRow && hoveredRow.classList.contains('valid-drop')) {
          const newRoomId = hoveredRow.dataset.roomId;
          const origRoom  = draggedBlock.dataset.roomId;
          const bid       = draggedBlock.dataset.bookingId;
          const bData     = bookings.find(b => b.id === bid && b.roomId === origRoom);
          if (bData) bData.roomId = newRoomId;
          renderCalendar();
        } else {
          draggedBlock.classList.remove('dragging-original');
        }
        ghost.remove();
        ghost = draggedBlock = originalRow = null;
        document.querySelectorAll('.room-row').forEach(r => r.classList.remove('valid-drop', 'invalid-drop'));
        document.body.classList.remove('dragging-invalid');
      });
    }

    renderCalendar();
  </script>
</body>
</html>
