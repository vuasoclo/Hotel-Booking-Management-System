<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms - HBMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="css/globals.css">
  <style>
    .room-card {
      height: 100%;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .room-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }
    .room-card.status-available { border-color: #10B981; }
    .room-card.status-occupied { background-color: #EBF5FB; border-color: #2E86C1; }
    .room-card.status-dirty { background-color: #FEF9E7; border-color: #F1C40F; }
    .room-card.status-maintenance { background-color: #FDEDEC; border-color: #E74C3C; }
    
    .room-status-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 4px;
      display: inline-block;
    }
    .badge-available { background: rgba(16, 185, 129, 0.1); color: #059669; }
    .badge-occupied { background: rgba(46, 134, 193, 0.1); color: #1B4F72; }
    .badge-dirty { background: rgba(241, 196, 15, 0.1); color: #B7950B; }
    .badge-maintenance { background: rgba(231, 76, 60, 0.1); color: #922B21; }
  </style>
</head>
<body class="d-flex flex-column vh-100">

  <header class="topbar d-flex align-items-center justify-content-between px-4 w-100">
    <div class="d-flex align-items-center gap-3">
      <i data-feather="box" class="text-primary"></i>
      <span class="text-heading mb-0">Little Hotelier</span>
    </div>
    <div class="d-flex align-items-center gap-3">
      <div class="d-flex align-items-center gap-1">
        <span class="text-subheading" id="topbar-name">...</span>
        <span id="topbar-role" style="display:none"></span>
      </div>
      <i data-feather="bell" class="text-muted"></i>
      <button id="btn-logout" class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1" style="height:30px">
        <i data-feather="log-out" style="width:14px"></i> Logout
      </button>
    </div>
  </header>

  <div class="d-flex flex-grow-1 overflow-hidden">
    <aside class="sidebar py-3 d-flex flex-column">
      <nav class="flex-grow-1">
        <a href="calendar.html" class="sidebar-item"><i data-feather="calendar" class="me-2"></i> Calendar</a>
        <a href="new-reservation.html" class="sidebar-item"><i data-feather="plus-square" class="me-2"></i> New Reservation</a>
        <a href="rooms.html" class="sidebar-item active"><i data-feather="layout" class="me-2"></i> Rooms</a>
        <a href="statistics.html" class="sidebar-item"><i data-feather="bar-chart-2" class="me-2"></i> Statistics</a>
      </nav>
    </aside>

    <main class="main-content flex-grow-1 overflow-auto bg-light">
      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-end mb-3">
          <h1 class="text-display mb-0">Room Status</h1>
          <div class="d-flex gap-2">
            <select class="form-select form-control-custom" style="width: 150px;">
              <option>All Status</option>
              <option>Available</option>
              <option>Occupied</option>
              <option>Dirty</option>
              <option>Maintenance</option>
            </select>
          </div>
        </div>
        
        <div class="bg-white p-3 rounded border d-flex gap-4">
          <div class="d-flex align-items-center gap-2"><span class="badge badge-available">Available: 8</span></div>
          <div class="d-flex align-items-center gap-2"><span class="badge badge-occupied">Occupied: 5</span></div>
          <div class="d-flex align-items-center gap-2"><span class="badge badge-dirty">Dirty: 2</span></div>
          <div class="d-flex align-items-center gap-2"><span class="badge badge-maintenance">Maintenance: 1</span></div>
        </div>
      </div>

      <div class="mb-5">
        <h2 class="text-heading mb-3 border-bottom pb-2">Deluxe King</h2>
        <div class="row g-3">
          <div class="col-md-3 col-sm-6">
            <div class="card-panel p-3 room-card status-occupied cursor-pointer" onclick="window.location.href='booking-detail.html'">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h3 class="text-heading mb-0">R101</h3>
                <span class="room-status-badge badge-occupied">Occupied</span>
              </div>
              <div class="mt-3 text-small">
                <div class="fw-bold">John Doe</div>
                <div class="text-muted">→ 28 Apr 12:00</div>
              </div>
            </div>
          </div>
          <div class="col-md-3 col-sm-6">
            <div class="card-panel p-3 room-card status-dirty">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h3 class="text-heading mb-0">R102</h3>
                <span class="room-status-badge badge-dirty">Dirty</span>
              </div>
              <div class="mt-3 text-small d-flex justify-content-end">
                <button class="btn btn-sm btn-outline-warning d-flex align-items-center gap-1">
                  <i data-feather="check" style="width:14px"></i> Clean
                </button>
              </div>
            </div>
          </div>
          <div class="col-md-3 col-sm-6">
            <div class="card-panel p-3 room-card status-available">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h3 class="text-heading mb-0">R103</h3>
                <span class="room-status-badge badge-available">Available</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="mb-5">
        <h2 class="text-heading mb-3 border-bottom pb-2">Suite</h2>
        <div class="row g-3">
          <div class="col-md-3 col-sm-6">
            <div class="card-panel p-3 room-card status-available">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h3 class="text-heading mb-0">R201</h3>
                <span class="room-status-badge badge-available">Available</span>
              </div>
            </div>
          </div>
          <div class="col-md-3 col-sm-6">
            <div class="card-panel p-3 room-card status-maintenance">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h3 class="text-heading mb-0">R202</h3>
                <span class="room-status-badge badge-maintenance">Maintenance</span>
              </div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    feather.replace();
    (function() {
      const s = JSON.parse(sessionStorage.getItem('hbms_user') || 'null');
      if (!s) { window.location.href = 'index.html'; return; }
      document.getElementById('topbar-name').textContent = s.name;
      if (s.role === 'admin') { const b = document.getElementById('topbar-role'); b.textContent='Admin'; b.className='badge bg-warning text-dark ms-1'; b.style.display='inline'; }
      document.getElementById('btn-logout').addEventListener('click', () => { sessionStorage.removeItem('hbms_user'); window.location.href='index.html'; });
    })();
  </script>
</body>
</html>
