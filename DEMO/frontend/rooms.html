<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms - HBMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="css/globals.css">
  <style>
    .room-card {
      height: 100%;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .room-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }
    .room-card.status-available { border-color: #10B981; }
    .room-card.status-occupied { background-color: #EBF5FB; border-color: #2E86C1; }
    .room-card.status-dirty { background-color: #FEF9E7; border-color: #F1C40F; }
    .room-card.status-maintenance { background-color: #FDEDEC; border-color: #E74C3C; }
    
    .room-status-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 4px;
      display: inline-block;
    }
    .badge-available { background: rgba(16, 185, 129, 0.1); color: #059669; }
    .badge-occupied { background: rgba(46, 134, 193, 0.1); color: #1B4F72; }
    .badge-dirty { background: rgba(241, 196, 15, 0.1); color: #B7950B; }
    .badge-maintenance { background: rgba(231, 76, 60, 0.1); color: #922B21; }
  </style>
</head>
<body class="d-flex flex-column vh-100">

  <header class="topbar d-flex align-items-center justify-content-between px-4 w-100">
    <div class="d-flex align-items-center gap-3">
      <i data-feather="box" class="text-primary"></i>
      <span class="text-heading mb-0">Little Hotelier</span>
    </div>
    <div class="d-flex align-items-center gap-3">
      <div class="d-flex align-items-center gap-1">
        <span class="text-subheading" id="topbar-name">...</span>
        <span id="topbar-role" style="display:none"></span>
      </div>
      <i data-feather="bell" class="text-muted"></i>
      <button id="btn-logout" class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1" style="height:30px">
        <i data-feather="log-out" style="width:14px"></i> Logout
      </button>
    </div>
  </header>

  <div class="d-flex flex-grow-1 overflow-hidden">
    <aside class="sidebar py-3 d-flex flex-column">
      <nav class="flex-grow-1">
        <a href="calendar.html" class="sidebar-item"><i data-feather="calendar" class="me-2"></i> Calendar</a>
        <a href="new-reservation.html" class="sidebar-item"><i data-feather="plus-square" class="me-2"></i> New Reservation</a>
        <a href="rooms.html" class="sidebar-item active"><i data-feather="layout" class="me-2"></i> Rooms</a>
        <a href="statistics.html" class="sidebar-item"><i data-feather="bar-chart-2" class="me-2"></i> Statistics</a>
      </nav>
    </aside>

    <main class="main-content flex-grow-1 overflow-auto bg-light">
      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-end mb-3">
          <h1 class="text-display mb-0">Room Status</h1>
          <div class="d-flex gap-2">
            <select class="form-select form-control-custom" style="width: 150px;">
              <option>All Status</option>
              <option>Available</option>
              <option>Occupied</option>
              <option>Dirty</option>
              <option>Maintenance</option>
            </select>
          </div>
        </div>
        
        <div class="bg-white p-3 rounded border d-flex gap-4">
          <div class="d-flex align-items-center gap-2"><span class="badge badge-available">Available: <span id="count-available">0</span></span></div>
          <div class="d-flex align-items-center gap-2"><span class="badge badge-occupied">Occupied: <span id="count-occupied">0</span></span></div>
          <div class="d-flex align-items-center gap-2"><span class="badge badge-dirty">Dirty: <span id="count-dirty">0</span></span></div>
          <div class="d-flex align-items-center gap-2"><span class="badge badge-maintenance">Maintenance: <span id="count-maintenance">0</span></span></div>
        </div>
      </div>

      <div id="rooms-container">
        <!-- Rooms will be rendered here dynamically -->
      </div>



    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      feather.replace();
      let sessionData = null;
      (function() {
        sessionData = JSON.parse(sessionStorage.getItem('hbms_user') || 'null');
        if (!sessionData) { window.location.href = 'index.html'; return; }
        document.getElementById('topbar-name').textContent = sessionData.name;
        if (sessionData.role === 'admin') { const b = document.getElementById('topbar-role'); b.textContent='Admin'; b.className='badge bg-warning text-dark ms-1'; b.style.display='inline'; }
        document.getElementById('btn-logout').addEventListener('click', () => { sessionStorage.removeItem('hbms_user'); window.location.href='index.html'; });
      })();

      let allRooms = [];

      async function fetchRooms() {
        try {
          const response = await fetch('http://localhost:8000/api/rooms/status');
          if (!response.ok) throw new Error('Network response was not ok');
          allRooms = await response.json();
          renderRooms();
        } catch (error) {
          console.error('Error fetching rooms:', error);
          alert('Không thể tải dữ liệu phòng.');
        }
      }

      function renderRooms() {
        const filterStatus = document.querySelector('select.form-select').value;
        const container = document.getElementById('rooms-container');
        container.innerHTML = '';

        let countAvailable = 0;
        let countOccupied = 0;
        let countDirty = 0;
        let countMaintenance = 0;

        const groupedRooms = {};

        allRooms.forEach(room => {
          if (room.physical_status === 'Available') countAvailable++;
          else if (room.physical_status === 'Occupied') countOccupied++;
          else if (room.physical_status === 'Dirty') countDirty++;
          else if (room.physical_status === 'Maintenance') countMaintenance++;

          if (filterStatus === 'All Status' || room.physical_status === filterStatus) {
            if (!groupedRooms[room.type_name]) {
              groupedRooms[room.type_name] = [];
            }
            groupedRooms[room.type_name].push(room);
          }
        });

        document.getElementById('count-available').textContent = countAvailable;
        document.getElementById('count-occupied').textContent = countOccupied;
        document.getElementById('count-dirty').textContent = countDirty;
        document.getElementById('count-maintenance').textContent = countMaintenance;

        for (const [typeName, rooms] of Object.entries(groupedRooms)) {
          let typeHtml = `<div class="mb-5">
            <h2 class="text-heading mb-3 border-bottom pb-2">${typeName}</h2>
            <div class="row g-3">`;

          rooms.forEach(room => {
            let cardClass = '';
            let badgeClass = '';
            let innerHtml = '';
            let clickAttr = '';

            if (room.physical_status === 'Available') {
              cardClass = 'status-available';
              badgeClass = 'badge-available';
            } else if (room.physical_status === 'Occupied') {
              cardClass = 'status-occupied cursor-pointer';
              badgeClass = 'badge-occupied';
              if (room.booking_id) clickAttr = `onclick="window.location.href='booking-detail.html?id=${room.booking_id}'"`;
              innerHtml = `<div class="mt-3 text-small">
                <div class="fw-bold">${room.current_guest || 'Guest'}</div>
                <div class="text-muted">→ ${room.expected_check_out ? new Date(room.expected_check_out).toLocaleString('vi-VN', {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'}) : ''}</div>
              </div>`;
            } else if (room.physical_status === 'Dirty') {
              cardClass = 'status-dirty';
              badgeClass = 'badge-dirty';
              innerHtml = `<div class="mt-3 text-small d-flex justify-content-end">
                <button class="btn btn-sm btn-outline-warning d-flex align-items-center gap-1" onclick="cleanRoom(${room.room_id})">
                  <i data-feather="check" style="width:14px"></i> Clean
                </button>
              </div>`;
            } else if (room.physical_status === 'Maintenance') {
              cardClass = 'status-maintenance';
              badgeClass = 'badge-maintenance';
            }

            typeHtml += `
              <div class="col-md-3 col-sm-6">
                <div class="card-panel p-3 room-card ${cardClass}" ${clickAttr}>
                  <div class="d-flex justify-content-between align-items-start mb-2">
                    <h3 class="text-heading mb-0">${room.room_number}</h3>
                    <span class="room-status-badge ${badgeClass}">${room.physical_status}</span>
                  </div>
                  ${innerHtml}
                </div>
              </div>`;
          });

          typeHtml += `</div></div>`;
          container.innerHTML += typeHtml;
        }
        feather.replace();
      }

      async function cleanRoom(roomId) {
        try {
          const response = await fetch(`http://localhost:8000/api/rooms/${roomId}/housekeeping?staff_id=${sessionData.staffId}`, {
            method: 'POST'
          });
          if (!response.ok) throw new Error('Housekeeping failed');
          fetchRooms();
        } catch (error) {
          console.error('Error cleaning room:', error);
          alert('Không thể dọn phòng.');
        }
      }

      document.querySelector('select.form-select').addEventListener('change', renderRooms);
      
      // Load rooms on startup
      fetchRooms();
    </script>
</body>
</html>
